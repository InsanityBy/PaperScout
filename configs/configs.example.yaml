# configs.example.yaml
# 配置模板, 使用前重命名为`configs.yaml`


# 数据库配置
chunk_size: 100

# 网络请求配置
max_concurrent_workers: 10
max_retries: 3
request_timeout: 30

# 请求链接配置
# arXiv: 获取论文DOI和论文详情
arxiv_base_url: "http://export.arxiv.org"
arxiv_batch_limit: 200
# DBLP: 获取论文DOI
dblp_base_url: "https://dblp.org"
# Crossref: 验证论文DOI
cr_base_url: "https://api.crossref.org"
# Semantic Scholar: 获取论文详情
s2_base_url: "https://api.semanticscholar.org"
s2_batch_limit: 500
# OpenAlex: 获取论文详情
oa_base_url: "https://api.openalex.org"
oa_batch_limit: 50

# LLM: 翻译/分析论文详情
# 当前验证支持的供应商: deepseek, qwen, kimi, glm, seed
# 不支持的供应商如果兼容OpenAI接口, 可设置为openai_compatible, 但不保证完全兼容
llm_provider: "deepseek"
# 下列内容为当前中国内地使用的接口地址, 使用前请先查阅文档确认接口地址和模型名
#     DeepSeek: llm_base_url: "https://api.deepseek.com"
#     Qwen: llm_base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
#     Kimi: llm_base_url: "https://api.moonshot.cn/v1"
#     GLM: llm_base_url: "https://open.bigmodel.cn/api/paas/v4"
#     Seed: llm_base_url: "https://ark.cn-beijing.volces.com/api/v3"
llm_base_url: "https://api.deepseek.com"
llm_model: "deepseek-v4-flash"
# 思考模式: disabled, enabled, auto
# 不支持设置auto的供应商会使用模型默认行为 (默认行为通常是启用思考模式)
# openai_compatible会忽略思考配置
llm_thinking_mode: "disabled"
# 思考强度: low, medium, high, max
#     DeepSeek: high, max (官方兼容low和medium, 均映射为high)
#     Seed: low, medium, high (不支持max, 映射为high)
# 不支持思考强度设置的供应商会忽略该配置
llm_reasoning_effort: "high"
# 思考预算: Token数, 不需要时留空
#     Qwen: 支持设置思考预算
# 不支持思考预算设置的供应商会忽略该配置
llm_thinking_budget: ~

# Zotero: 上传论文
zotero_batch_limit: 50

# arXiv回溯日期限制
arxiv_max_lookback_days: 30

# 分析配置
relevance_threshold: 7.0  # 相关性阈值, 用于筛选出相关性高的论文

# 导出配置
export_directory: "./exports"

# 提示词配置
# 注意: 可以根据需求调整提示词内容
system_prompt: |-
  # Role
  You are an expert academic research assistant evaluating papers based on a strict rubric
  # Inputs
  - <interests>{USER_INTERESTS}</interests>
  - <tags>{TAGS}</tags>
  - Paper Details: {TITLE} & {ABSTRACT}
  # Tasks & Rules
  1. Evaluate & Score: Assess the paper strictly using the `<interests>` rubric
    - Score range: 0.0 to 10.0 (0.1 increments)
    - VETO CHECK: If any `[Must NOT Have]` matches, score is 0.0
    - BASE CHECK: Calculate the initial score by evaluating each `[Must Have]` condition individually
      - Proportional Scoring: Assess the match degree for each condition individually and award proportional points (from 0.0 up to its max points)
      - Base Calculation: Sum the awarded points from all `[Must Have]` conditions to get the total Base Score
    - CALCULATION: Apply `[Penalty Points]` and `[Bonus Points]` to the Base Score
  2. Translate: Translate the title and abstract into fluent, professional Chinese
  3. Tagging: Extract English technical keywords strictly from `<tags>`. Select at least one from every suitable category. Do NOT invent new tags
  # Output Format
  Output ONLY a valid JSON object. To ensure math accuracy, generate `relevance_reason` BEFORE `relevance_score`. Follow this exact schema:
  ```json
  {
      "title_cn": "Chinese translation of the title",
      "abstract_cn": "Chinese translation of the abstract",
      "relevance_reason": "若触发否决项直接填写: 0.0(触发否决项理由)。正常填写: 基础分X.X(条件1: X.X, 理由; 条件2: X.X, 理由...)。扣分项: -X.X(理由), 加分项: +X.X(理由)。省略无加/扣分部分。",
      "relevance_score": 8.5,
      "keywords": ["tag1", "tag2", "tag3"]
  }
  ```
# 注意: 使用前填写个人兴趣, 尽量确保精确, 避免相关性评分不准确
user_interests: |-
  [Core Research Area]
  <Provide a high-level overview of your core research domain here to give the AI context>
  [Must NOT Have] (Veto: If any match, Score = 0.0)
  1. <Absolute dealbreaker condition 1>
  2. <Absolute dealbreaker condition 2>
  [Must Have] (Base Score Components: sum of these determines the initial Base Score)
  1. <Essential element 1> (Range: 0.0 - <score>)
  2. <Essential element 2> (Range: 0.0 - <score>)
  [Penalty Points] (Deduct from Base Score)
  1. <Negative feature 1> (-<score>)
  2. <Negative feature 2> (-<score>)
  [Bonus Points] (Add to Base Score)
  1. <Bonus condition 1> (+<score>)
  2. <Bonus condition 2> (+<score>)
