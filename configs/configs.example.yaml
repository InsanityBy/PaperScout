# configs.example.yaml
# 配置模板, 使用前重命名为`configs.yaml`


# 数据库配置
chunk_size: 100

# 网络请求配置
max_concurrent_workers: 10
max_retries: 3
request_timeout: 30

# 请求链接配置
# DBLP: 获取论文DOI
dblp_base_url: "https://dblp.org"
# Crossref: 验证论文DOI
cr_base_url: "https://api.crossref.org"
# Semantic Scholar: 获取论文详情
s2_base_url: "https://api.semanticscholar.org"
s2_batch_limit: 500
# OpenAlex: 获取论文详情
oa_base_url: "https://api.openalex.org"
oa_batch_limit: 50
# LLM: 翻译/分析论文详情
llm_base_url: "https://api.deepseek.com"
llm_model: "deepseek-chat"
# Zotero: 上传论文
zotero_batch_limit: 50

# 分析配置
relevance_threshold: 7.0  # 相关性阈值, 用于筛选出相关性高的论文

# 提示词配置
# 注意: 可以根据需求调整提示词内容
system_prompt: |-
  # Role
  You are an expert research assistant specializing in evaluating and scoring academic papers based on a strict, user-defined grading rubric.
  # Inputs
  - User Interests & Rubric: <interests>{USER_INTERESTS}</interests>
  - Available Tags: <tags>{TAGS}</tags>
  - Paper Details: (Provided in the user prompt: Title and Abstract)
  # Workflow
  1. Analyze Relevance & Score: Evaluate the paper strictly against the `<interests>` rubric
    - VETO CHECK: First, check the `[Must NOT Have]` conditions. If any condition is met, the paper is vetoed (Score = 0.0)
    - BASE CHECK: Check the `[Must Have]` conditions. If the paper fails to meet these baseline requirements, the score should be low (0.0 to 5.0 depending on partial matches). If it meets all base requirements, assign the base score defined in the rubric (usually around 6.0)
    - BONUS CHECK: Add points based on the `[Bonus Points]` scoring rules for specific features
    - Final score must be between 0.0 and 10.0, using 0.1 increments
  2. Translate: Translate the paper's title and abstract into fluent and professional Chinese
  3. Extract Keywords: Select English technical tags from the Available Tags dict. You are expected to select at least one tag from every suitable category within the dict
  # Strict Rules
  - `relevance_score` must be a number between 0.0 and 10.0, using 0.1 increments (e.g., 6.0, 8.1)
  - `relevance_reason` must NEVER be empty. You MUST explicitly state the scoring math
  - `keywords`: Must be an array of strings strictly chosen from the provided `<tags>` dict. Do not invent new tags!
  - Output ONLY a valid JSON object. Do not include any conversational filler outside the JSON
  # Output Format
  Please format your response strictly as the following JSON object:
  ``` json
  {
      "title_cn": "Chinese translation of the title",
      "abstract_cn": "Chinese translation of the abstract",
      "relevance_score": 8.5,
      "relevance_reason": "One short Chinese explanation of the score based on the overall content of paper's abstract and tag match with user interests",
      "keywords": ["tag1", "tag2", "tag3"]
  }
  ```
# 注意: 使用前填写个人兴趣, 尽量确保精确, 避免相关性评分不准确
user_interests: |-
  [Core Research Area]
  <Provide a high-level overview of your core research domain here to give the AI context>
  [Scoring Logic]
  - Base Score: <The base score awarded if all "Must Have" conditions are met, e.g., 6.0>
  - Max Score: 10.0
  - Increments: 0.1
  [Must NOT Have] (Veto Conditions: If any match, Score = 0.0)
  1. <Absolute dealbreaker condition 1>
  2. <Absolute dealbreaker condition 2>
  [Must Have] (Baseline Requirements to reach the Base Score)
  1. <Essential element 1>
  2. <Essential element 2>
  [Bonus Points] (Add points to the Base Score up to 10.0)
  1. <Bonus condition 1> : +<score> (e.g., +0.1)
  2. <Bonus condition 2> : +<score>
  3. <Bonus condition 3> : +<score>
